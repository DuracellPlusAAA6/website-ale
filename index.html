// ── Render helpers ────────────────────────────────────────────────────────────
function renderTimeline(lang) {
    const t = i18n[lang];
    document.getElementById('timeline').innerHTML = t.experience.map(exp => `
        <div class="tl-item${exp.current ? ' tl-current' : ''}">
            <div class="tl-dot"></div>
            <div class="tl-content">
                <div class="tl-header">
                    <span class="tl-title">${exp.title}</span>
                    ${exp.current ? `<span class="tl-badge">${t.currentLabel}</span>` : ''}
                </div>
                <div class="tl-institution">${exp.institution}</div>
                <div class="tl-meta">
                    <span><i class="fas fa-map-marker-alt"></i> ${exp.location}</span>
                    <span><i class="far fa-calendar-alt"></i> ${exp.period}</span>
                </div>
            </div>
        </div>
    `).join('');
}

function renderEducation(lang) {
    const e = i18n[lang].education;
    document.getElementById('edu-card').innerHTML = `
        <div class="edu-inner">
            <div class="edu-icon"><i class="fas fa-university"></i></div>
            <div class="edu-details">
                <div class="edu-degree">${e.degree}</div>
                <div class="edu-institution">${e.institution}</div>
                <div class="edu-meta">
                    <span><i class="fas fa-map-marker-alt"></i> ${e.location}</span>
                    <span><i class="far fa-calendar-alt"></i> ${e.period}</span>
                </div>
            </div>
        </div>
    `;
}

function renderSkills(lang) {
    document.getElementById('skills-grid').innerHTML = i18n[lang].skills
        .map(s => `<span class="skill-pill">${s}</span>`).join('');
}

function renderLanguages(lang) {
    document.getElementById('langs-grid').innerHTML = i18n[lang].languages.map(l => `
        <div class="lang-item">
            <div class="lang-top">
                <span class="lang-flag">${l.flag}</span>
                <span class="lang-name">${l.name}</span>
                <span class="lang-level">${l.level}</span>
            </div>
            <div class="lang-bar-bg">
                <div class="lang-bar-fill" style="width:${l.pct}%"></div>
            </div>
        </div>
    `).join('');
}

// ── Language switcher ─────────────────────────────────────────────────────────
function setLang(lang) {
    document.documentElement.lang = lang;
    document.querySelectorAll('.lang-btn').forEach(btn =>
        btn.classList.toggle('active', btn.dataset.lang === lang));
    document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.dataset.i18n;
        if (i18n[lang][key]) el.textContent = i18n[lang][key];
    });
    renderTimeline(lang);
    renderEducation(lang);
    renderSkills(lang);
    renderLanguages(lang);
}

// ── Show captcha after button click ───────────────────────────────────────────
function showCaptcha() {
    document.getElementById('reveal-btn-wrapper').style.display = 'none';
    document.getElementById('captcha-wrapper').classList.remove('hidden');
}

// ── Cloudflare Turnstile callback ─────────────────────────────────────────────
function onCaptchaDone() {
    const u = ['d','r'].join('');
    const d = ['v','a','t','a','m','a','n','e','l','u','.','c','o','m'].join('');
    const email = u + '\u0040' + d;
    const box = document.getElementById('email-reveal');
    box.innerHTML = `
        <i class="fas fa-envelope-open-text"></i>
        <a href="mailto:${email}" class="email-link">${email}</a>
    `;
    document.getElementById('captcha-wrapper').style.display = 'none';
    box.classList.remove('hidden');
}
